<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 616" role="img">
<title>질문 처리 흐름과 신뢰 경계</title>
<desc>질문이 결정적 코드에서 권한 검사와 컨텍스트 구성을 거쳐, 확률적 모델 샌드박스로 들어갔다가, 다시 결정적 검증 게이트와 저장 단계로 나오는 흐름</desc>
<style>
  .t  { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; }
  .th { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .c-gray rect  { fill: #F1EFE8; stroke: #888780; }
  .c-amber rect { fill: #FAEEDA; stroke: #BA7517; }
  .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
  .c-gray  .th { fill: #2C2C2A; }  .c-gray  .ts { fill: #5F5E5A; }
  .c-amber .th { fill: #412402; }  .c-amber .ts { fill: #633806; }
  .c-teal  .th { fill: #04342C; }  .c-teal  .ts { fill: #085041; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="616" fill="#ffffff"/>

<rect x="210" y="44" width="320" height="164" rx="14" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="6 4"/>
<text class="th" x="224" y="64" dominant-baseline="central">결정적 영역 — 권한·컨텍스트</text>
<g class="c-gray"><rect x="230" y="80" width="280" height="50" rx="8" stroke-width="0.5"/><text class="th" x="370" y="99" text-anchor="middle" dominant-baseline="central">질문 + org_id</text><text class="ts" x="370" y="116" text-anchor="middle" dominant-baseline="central">인증된 요청</text></g>
<g class="c-gray"><rect x="230" y="148" width="280" height="50" rx="8" stroke-width="0.5"/><text class="th" x="370" y="167" text-anchor="middle" dominant-baseline="central">문서 로드 → 컨텍스트</text><text class="ts" x="370" y="184" text-anchor="middle" dominant-baseline="central">WHERE org_id · &lt;document&gt;</text></g>
<line x1="370" y1="130" x2="370" y2="146" class="arr" marker-end="url(#arrow)"/>

<line x1="370" y1="208" x2="370" y2="234" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="221" dominant-baseline="central">입력 경계</text>

<rect x="210" y="236" width="320" height="164" rx="14" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="6 4"/>
<text class="th" x="224" y="256" dominant-baseline="central">확률적 샌드박스 — 모델</text>
<g class="c-amber"><rect x="230" y="272" width="280" height="50" rx="8" stroke-width="0.5"/><text class="th" x="370" y="291" text-anchor="middle" dominant-baseline="central">Claude · generateObject</text><text class="ts" x="370" y="308" text-anchor="middle" dominant-baseline="central">위 컨텍스트만 입력됨</text></g>
<g class="c-amber"><rect x="230" y="340" width="280" height="50" rx="8" stroke-width="0.5"/><text class="th" x="370" y="359" text-anchor="middle" dominant-baseline="central">구조화 출력</text><text class="ts" x="370" y="376" text-anchor="middle" dominant-baseline="central">{ grounded, answer, citations }</text></g>
<line x1="370" y1="322" x2="370" y2="338" class="arr" marker-end="url(#arrow)"/>

<line x1="370" y1="400" x2="370" y2="426" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="413" dominant-baseline="central">검증 경계</text>

<rect x="210" y="428" width="320" height="164" rx="14" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 4"/>
<text class="th" x="224" y="448" dominant-baseline="central">결정적 영역 — 검증·저장</text>
<g class="c-teal"><rect x="230" y="464" width="280" height="50" rx="8" stroke-width="0.5"/><text class="th" x="370" y="483" text-anchor="middle" dominant-baseline="central">검증 게이트</text><text class="ts" x="370" y="500" text-anchor="middle" dominant-baseline="central">불변식 + quote ∈ 원문</text></g>
<g class="c-teal"><rect x="230" y="532" width="280" height="50" rx="8" stroke-width="0.5"/><text class="th" x="370" y="551" text-anchor="middle" dominant-baseline="central">messages 저장 → 반환</text><text class="ts" x="370" y="568" text-anchor="middle" dominant-baseline="central">grounded · citations(jsonb)</text></g>
<line x1="370" y1="514" x2="370" y2="530" class="arr" marker-end="url(#arrow)"/>
</svg>
